{{/* 版本切换器组件 - Version Switcher Component */}}
{{ $versions := .Site.Data.versions.versions }}
{{ $currentVersion := "" }}

{{ range $versions }}
  {{ if .current }}
    {{ $currentVersion = .name }}
  {{ end }}
{{ end }}

<div class="version-switcher hx-flex hx-items-center hx-gap-2">
  <select 
    class="hx-select hx-border hx-border-gray-300 hx-rounded-md hx-px-3 hx-py-2 hx-text-sm hx-bg-white hx-dark:hx-bg-gray-800 hx-dark:hx-border-gray-600 hx:focus:hx-outline-none hx:focus:hx-ring-2 hx:focus:hx-ring-blue-500"
    onchange="location = this.value;"
    aria-label="Select documentation version"
  >
    {{ range $versions }}
    <option 
      value="{{ .path }}" 
      {{ if .current }}selected{{ end }}
    >
      {{ .name }}{{ if .current }} (Current){{ end }}
    </option>
    {{ end }}
  </select>
  
  {{ if $currentVersion }}
  <span class="hx-text-xs hx-text-gray-500 hx-dark:hx-text-gray-400">
    Version: <strong>{{ $currentVersion }}</strong>
  </span>
  {{ end }}
</div>
