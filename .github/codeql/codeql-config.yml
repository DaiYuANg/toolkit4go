# CodeQL configuration for arcgo
# See: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/customizing-code-scanning

name: "ArcGo CodeQL Config"

# Exclude go/reflected-xss: accessLogResponseWriter in httpx/server_routes.go is a
# pass-through ResponseWriter wrapper for access logging. Handlers return typed
# structs serialized to JSON by Huma; JSON encoding escapes special characters.
# This query produces false positives on generic ResponseWriter wrappers.
query-filters:
  - exclude:
      id: go/reflected-xss
