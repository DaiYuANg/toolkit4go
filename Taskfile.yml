# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  REMOTE: origin
  CACHE_DIR: '{{.ROOT_DIR}}/.cache'
  GO_CACHE_DIR: '{{.CACHE_DIR}}/go-build'
  GOLANGCI_CACHE_DIR: '{{.CACHE_DIR}}/golangci-lint'
  STATICCHECK_CACHE_DIR: '{{.CACHE_DIR}}/staticcheck'

env:
  GOCACHE: '{{.GO_CACHE_DIR}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - go tool task --list

  fmt:
    desc: Format all Go packages
    cmds:
      - go fmt ./...

  lint:
    desc: Run golangci-lint (includes staticcheck) and govulncheck per go.work module. For standalone staticcheck, run `go run ./scripts/workspace-modules/main.go staticcheck` (optional env STATICCHECK_CHECKS).
    env:
      GOLANGCI_LINT_CACHE: '{{.GOLANGCI_CACHE_DIR}}'
      STATICCHECK_CACHE: '{{.STATICCHECK_CACHE_DIR}}'
    cmds:
      - go run ./scripts/workspace-modules/main.go lint
      - go run ./scripts/workspace-modules/main.go govulncheck

  test:
    desc: Run all Go tests (every module in go.work)
    cmds:
      - go run ./scripts/workspace-modules/main.go test

  lint:staticcheck:
    desc: Run honnef staticcheck only per module (optional; golangci-lint already runs staticcheck). Set STATICCHECK_CHECKS for -checks.
    env:
      STATICCHECK_CACHE: '{{.STATICCHECK_CACHE_DIR}}'
    cmds:
      - go run ./scripts/workspace-modules/main.go staticcheck

  check:
    desc: Run fmt, lint and test
    deps:
      - fmt
      - lint
      - test

  mod:tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  git:status:
    desc: Show concise git status
    cmds:
      - git status -sb

  git:pull:
    desc: Pull latest commits (fast-forward only)
    cmds:
      - git pull --ff-only

  git:push:
    desc: Push current branch
    cmds:
      - git push

  git:hooks:install:
    desc: Install hooks via lefthook
    cmds:
      - go tool lefthook install

  git:hooks:uninstall:
    desc: Uninstall hooks via lefthook
    cmds:
      - go tool lefthook uninstall

  git:hooks:run:
    desc: Run pre-commit hooks manually
    cmds:
      - go tool lefthook run pre-commit

  git:tag:list:
    desc: List tags sorted by version (newest first)
    cmds:
      - git tag --sort=-version:refname

  git:tag:create:
    desc: Create annotated tag (task git:tag:create VERSION=v1.2.3)
    requires:
      vars:
        - VERSION
    cmds:
      - git tag -a {{.VERSION}} -m "{{.VERSION}}"

  git:tag:push:
    desc: Push one tag to remote (task git:tag:push VERSION=v1.2.3)
    requires:
      vars:
        - VERSION
    cmds:
      - git push {{.REMOTE}} {{.VERSION}}

  git:tag:delete:
    desc: Delete local and remote tag (task git:tag:delete VERSION=v1.2.3)
    requires:
      vars:
        - VERSION
    cmds:
      - git tag -d {{.VERSION}}
      - git push {{.REMOTE}} :refs/tags/{{.VERSION}}

  release:auto:
    desc: Auto bump patch version and create local tag
    cmds:
      - go run ./scripts/tagger patch

  release:auto:push:
    desc: Auto bump patch version and push tag
    env:
      TAGGER_REMOTE: '{{.REMOTE}}'
    cmds:
      - go run ./scripts/tagger patch-push

  release:minor:
    desc: Auto bump minor version and create local tag
    cmds:
      - go run ./scripts/tagger minor

  release:minor:push:
    desc: Auto bump minor version and push tag
    env:
      TAGGER_REMOTE: '{{.REMOTE}}'
    cmds:
      - go run ./scripts/tagger minor-push

  release:major:
    desc: Auto bump major version and create local tag
    cmds:
      - go run ./scripts/tagger major

  release:major:push:
    desc: Auto bump major version and push tag
    env:
      TAGGER_REMOTE: '{{.REMOTE}}'
    cmds:
      - go run ./scripts/tagger major-push

  tag:
    desc: Alias of release:auto
    deps:
      - release:auto

  docs:version:sync:
    desc: Sync documentation versions from git tags
    cmds:
      - go run ./scripts/deploy-docs sync

  docs:serve:
    desc: Start Hugo development server
    cmds:
      - go run ./scripts/deploy-docs serve

  docs:build:
    desc: Build production documentation
    cmds:
      - go run ./scripts/deploy-docs build

  docs:deploy:
    desc: Build docs and force-push docs/public to docs branch
    vars:
      BRANCH: gh-pages
    env:
      DOCS_REMOTE: '{{.REMOTE}}'
      DOCS_BRANCH: '{{.BRANCH}}'
    cmds:
      - go run ./scripts/deploy-docs deploy

